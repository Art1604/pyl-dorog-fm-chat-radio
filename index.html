<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <base href="https://volnorez.com/">
  <title>ПыЛь_ДоРоГ FM</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #dcdcdc;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .app {
      max-width: 980px;
      margin: 8px auto;
      background: #e5e5e5;
      border: 1px solid #9a9a9a;
      border-radius: 8px;
      box-shadow: inset 0 1px 0 #ffffff;
      overflow: hidden;
    }

    .body-wrap {
      padding: 6px;
      background: #e5e5e5;
    }

    .player-box {
      background: #e5e5e5;
      margin-bottom: 4px;
    }

    /* почти незаметная стыковка */
    .chat-wrap {
      background: #d8d8d8;
      border: 1px solid #9f9f9f;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: inset 0 1px 0 #f8f8f8;
    }

    .chat-frame {
      height: 620px;
      background: #d8d8d8;
      overflow: hidden;
      position: relative;
    }

    #volnorez_chat {
      width: 100%;
      height: 100%;
      display: block;
    }

    .chat-fail {
      display: none;
      padding: 10px;
      font-size: 12px;
      color: #333;
      background: #fff5d8;
      border-top: 1px solid #d9c98d;
    }

    .chat-fail a {
      color: #111;
    }

    /* лёгкая подгонка под родной чат */
    .chat_message_input > img {
      vertical-align: bottom !important;
      margin-top: -8px !important;
      margin-bottom: -4px !important;
    }

    .chat_history img,
    .chat_smileys img,
    .smileys_sheet img {
      max-width: none !important;
      vertical-align: bottom !important;
    }

    .smileys_tabs {
      white-space: nowrap;
      overflow-x: auto;
    }

    .smileys_sheet {
      overflow: auto;
    }

    .smile_wrapper .video-container {
      width: 33.33%;
      height: 5vw;
      min-height: 56px;
      max-height: 96px;
      background: #000;
      display: inline-block;
      margin: 0 auto;
      vertical-align: middle;
      text-align: center;
    }

    .smile_wrapper .video-container .video_meme,
    .smile_wrapper video,
    .chat_history video {
      width: 100%;
      height: 100%;
      display: block;
      margin: auto;
      object-fit: contain;
      background: #000;
    }

    @media (max-width: 700px) {
      .app {
        margin: 0;
        border-radius: 0;
        max-width: 100%;
      }

      .body-wrap {
        padding: 4px;
      }

      .player-box {
        margin-bottom: 3px;
      }

      .chat-frame {
        height: calc(100vh - 88px);
      }

      .smile_wrapper .video-container {
        width: 42%;
        height: 12vw;
        min-height: 52px;
      }
    }
  </style>
</head>

<body>

      <!-- ТЕКУЩИЙ СЕРЫЙ ЧАТ -->

          <div

  <script>
    setTimeout(() => {
      const root = document.getElementById('volnorez_chat');
      const fail = document.getElementById('chatFail');

      if (!root || root.children.length === 0) {
        fail.style.display = 'block';
      }
    }, 4000);
  </script>
</body>
</html>
