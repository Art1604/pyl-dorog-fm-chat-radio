<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <base href="https://volnorez.com/">
  <title>ПыЛь_ДоРоГ FM — радио и чат</title>

  <style>
    body{
      margin:0;
      background:#e6e6e6;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    .shell{
      max-width:980px;
      margin:12px auto;
      background:#f4f4f4;
      border:1px solid #8f8f8f;
      border-radius:8px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.15);
    }

    .player-wrap{
      padding:10px;
      background:#ededed;
    }

    .divider{
      height:1px;
      background:#b9b9b9;
      box-shadow:0 1px 0 #ffffff inset;
    }

    .chat-wrap{
      padding:6px;
      background:#dcdcdc;
    }

    .chat-frame{
      height:560px;
      background:#ffffff;
      border-top:1px solid #ffffff;
      border-left:1px solid #ffffff;
      border-right:1px solid #8f8f8f;
      border-bottom:1px solid #8f8f8f;
      padding:6px;
      overflow:hidden;
      position:relative;
    }

    #volnorez_chat{
      width:100%;
      height:100%;
      display:block;
    }

    .chat-fail{
      display:none;
      position:absolute;
      left:6px;
      right:6px;
      bottom:6px;
      padding:10px;
      background:#fff3cd;
      border:1px solid #ffe08a;
      border-radius:8px;
      font-size:12px;
      color:#333;
    }

    .chat-fail a{
      color:#111;
    }

    @media (max-width:700px){
      .shell{
        margin:0;
        border-radius:0;
      }

      .chat-frame{
        height:calc(100vh - 120px);
      }
    }
  </style>
</head>

<body>
  <!-- Ранняя инициализация VK Mini App -->
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <script>
    (async () => {
      try {
        if (window.vkBridge && vkBridge.send) {
          await vkBridge.send('VKWebAppInit');
        }
      } catch (e) {
        console.log('VK init error:', e);
      }
    })();
  </script>

  <div class="shell">
    <!-- СЕРЫЙ ПЛЕЕР -->
    <div class="player-wrap">
      <div id="vplayer001e157d">
        <a href="https://volnorez.com/pyl_dorog-fm" title="радио ПыЛь_ДоРоГ FM">
          радио ПыЛь_ДоРоГ FM
        </a>
        <script
          async
          type="text/javascript"
          src="https://volnorez.com/plugins/jscode/player_js/001e157d/%7B%22autoplay%22%3Atrue%2C%22share%22%3A%22source%22%2C%22skin%22%3A%22skin2%22%2C%22style%22%3A%7B%22bg_clr%22%3A%22237%2C237%2C237%22%2C%22b_clr%22%3A%22179%2C179%2C179%22%2C%22icon_clr%22%3A%2266%2C66%2C66%22%2C%22ch%22%3A%2237%22%2C%22bg_clr1%22%3A%22243%2C243%2C243%22%2C%22bg_clr2%22%3A%22196%2C196%2C196%22%2C%22bg_clr3%22%3A%22183%2C183%2C183%22%2C%22bg_clr4%22%3A%22167%2C167%2C167%22%2C%22txt_clr%22%3A%22205%2C209%2C205%22%7D%7D">
        </script>
      </div>
    </div>

    <div class="divider"></div>

    <!-- СЕРЫЙ ЧАТ -->
    <div class="chat-wrap">
      <div class="chat-frame">
        <div
          id="volnorez_chat"
          data-code="001e157d"
          data-skin="skin_4"
          data-skin-params="'bg_clr':'222,222,222','panel_clr':'216,216,216','ib_clr':'250,250,250','msgbg_clr':'238,238,238','omsgbg_clr':'229,229,229','txt_clr':'18,18,18','b_clr':'145,145,145','icon_clr':'120,120,120','label_clr':'60,61,61','dj_clr':'63,191,7'">
        </div>

        <script src="https://volnorez.com/plugins/jscode/chat_js"></script>

        <div class="chat-fail" id="chatFail">
          Чат не загрузился.
          <a href="https://volnorez.com/pyl_dorog-fm/#chat_widget" target="_blank" rel="noopener">
            Открыть чат на сайте
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    setTimeout(() => {
      const root = document.getElementById('volnorez_chat');
      const fail = document.getElementById('chatFail');

      if (!root || root.children.length === 0) {
        fail.style.display = 'block';
      }
    }, 4000);
  </script>
</body>
</html>
