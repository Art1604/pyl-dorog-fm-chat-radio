    /* Видео-мемы */

    .smile_wrapper .video-container .video_meme,
    .smile_wrapper video,
    .chat_history video {

  <script>
    function absolutizeAssetUrl(url) {
      if (!url) return url;
      if (
        url.startsWith('http://') ||
        url.startsWith('https://') ||
        url.startsWith('data:') ||
        url.startsWith('blob:')
      ) return url;
      if (url.startsWith('//')) return 'https:' + url;
      if (url.startsWith('/')) return 'https://volnorez.com' + url;
      return url;
    }

    function fixBackgroundImageUrl(el) {
      const bg = getComputedStyle(el).backgroundImage;
      if (!bg || bg === 'none') return;
      const match = bg.match(/url\(["']?([^"')]+)["']?\)/);
      if (!match) return;

      const fixed = absolutizeAssetUrl(match[1]);
      if (fixed !== match[1]) {
        el.style.backgroundImage = `url("${fixed}")`;
      }
    }

    function fixVideoMemes(root = document) {
      root.querySelectorAll('video').forEach((video) => {
        const src = video.getAttribute('src');
        if (src) video.setAttribute('src', absolutizeAssetUrl(src));

        video.setAttribute('playsinline', '');
        video.setAttribute('muted', '');
        video.muted = true;
        video.loop = true;
        video.autoplay = true;
        video.preload = 'auto';

        video.querySelectorAll('source').forEach((source) => {
          const s = source.getAttribute('src');
          if (s) source.setAttribute('src', absolutizeAssetUrl(s));
        });

        try {
          video.load();
          const p = video.play();
          if (p && typeof p.catch === 'function') p.catch(() => {});
        } catch (e) {}
      });
    }

    function fixChatAssets(root = document) {
      root.querySelectorAll('img, source, video').forEach((el) => {
        const src = el.getAttribute('src');
        if (src) el.setAttribute('src', absolutizeAssetUrl(src));

        const poster = el.getAttribute('poster');
        if (poster) el.setAttribute('poster', absolutizeAssetUrl(poster));

        const srcset = el.getAttribute('srcset');
        if (srcset) {
          const fixed = srcset
            .split(',')
            .map(part => {
              const bits = part.trim().split(/\s+/);
              bits[0] = absolutizeAssetUrl(bits[0]);
              return bits.join(' ');
            })
            .join(', ');
          el.setAttribute('srcset', fixed);
        }
      });

      root.querySelectorAll('*').forEach((el) => {
        fixBackgroundImageUrl(el);
      });

      fixVideoMemes(root);
    }

    const observer = new MutationObserver(() => {
      fixChatAssets(document);
    });

    observer.observe(document.documentElement, {
      childList: true,
      subtree: true,
      attributes: true,
      attributeFilter: ['src', 'srcset', 'style', 'poster']
    });

    function runFixes() {
      fixChatAssets(document);

      const root = document.getElementById('volnorez_chat');
      const fail = document.getElementById('failBox');

      if (!root || root.children.length === 0) {
        fail.style.display = 'block';
      }
    }

    window.addEventListener('load', () => {
      runFixes();
      setTimeout(runFixes, 1500);
      setTimeout(runFixes, 3000);
      setTimeout(runFixes, 5000);
    });
  </script>
