<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ПыЛь_ДоРоГ FM — плеер и чат</title>

  <style>
    :root{
      --bg:#0b0b0f;
      --card:#12121a;
      --text:#fff;
      --muted:rgba(255,255,255,.72);
      --border:rgba(255,255,255,.10);
      --radius:16px;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; background:var(--bg); color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:12px;
      display:grid;
      gap:12px;
      grid-template-columns:1fr;
    }
    @media (min-width: 900px){
      .wrap{ grid-template-columns:1fr 1.2fr; }
    }

    .box{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:12px;
      overflow:hidden;
    }
    .title{
      margin:0 0 10px 0;
      font-weight:900;
      font-size:16px;
      letter-spacing:.2px;
    }
    .hint{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
    }
    a{ color:#fff; text-decoration:underline; }
  </style>
</head>

<body>
  <div class="wrap">
    <!-- ПЛЕЕР -->
    <div class="box">
      <p class="title">Плеер</p>

      <!-- Официальный JS-Code плеера Volnorez -->
      <div id="volnorez_live_player" style="width:100%;height:60px;display:block;">
        Слушать <a href="https://volnorez.com/pyl_dorog-fm" title="радио ПыЛь_ДоРоГ FM">радио ПыЛь_ДоРоГ FM</a>
        <script>
          // Ваш ID из JS-Code (у вас: 001e157d)
          var jscode_player_id = "001e157d";
        </script>
        <script src="https://volnorez.com/application/maxsite/plugins/jscode/js/jscode_player.js"></script>
      </div>

      <div class="hint">
        Если автозапуск не сработал — нажмите Play (браузеры часто блокируют autoplay).
      </div>
    </div>

    <!-- ЧАТ -->
    <div class="box">
      <p class="title">Чат</p>

      <!-- Официальный JS-Code чата Volnorez -->
      <div id="volnorez_chat" style="width:100%;height:520px;display:block;">
        Радио «<a href="https://volnorez.com/pyl_dorog-fm" title="слушать радио онлайн ПыЛь_ДоРоГ FM">ПыЛь_ДоРоГ FM</a>»
        <script>
          // Обычно chat_id = тот же, что и в “Ссылка и JS-Code”.
          // Пробуем тот же ID: 001e157d (как у плеера).
          var jscode_chat_id = "001e157d";
        </script>
        <script src="https://volnorez.com/application/maxsite/plugins/jscode/js/jscode_chat.js"></script>
      </div>

      <div class="hint">
        Если чат не появился: откройте Volnorez → Настройки станции → «Ссылка и JS-Code» и скопируйте именно “код чата”.
      </div>
    </div>
  </div>
</body>
</html>
