<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ПыЛь_ДоРоГ FM — радио и чат</title>

  <style>
    body{
      margin:0;
      background:#e6e6e6;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    .shell{
      max-width:980px;
      margin:12px auto;
      background:#f4f4f4;
      border:1px solid #8f8f8f;
      border-radius:8px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.15);
    }
    .player{
      padding:10px;
      background:#ededed;
    }
    .divider{
      height:1px;
      background:#b9b9b9;
      box-shadow:0 1px 0 #ffffff inset;
    }
    .chatWrap{
      padding:6px;
      background:#dcdcdc;
    }
    .chatFrame{
      height:560px;
      background:#fff;
      border-top:1px solid #fff;
      border-left:1px solid #fff;
      border-right:1px solid #8f8f8f;
      border-bottom:1px solid #8f8f8f;
      padding:6px;
      overflow:hidden;
    }
    .chatMask{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#fff;
    }
    .chatMask iframe{
      width:100%;
      height:680px;     /* 560 + crop */
      border:0;
      position:relative;
      top:-120px;       /* обрезаем лишнюю шапку mobile */
      background:#fff;
    }
  </style>
</head>

<body>
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <script>
    (async () => {
      try {
        if (window.vkBridge && vkBridge.send) {
          await vkBridge.send('VKWebAppInit');
        }
      } catch(e) {}
    })();
  </script>

  <div class="shell">

    <!-- ПЛЕЕР: твой дизайн полностью -->
    <div class="player">
      <div id="vplayer001e157d">
        <a href="https://volnorez.com/pyl_dorog-fm" title="радио ПыЛь_ДоРоГ FM">радио ПыЛь_ДоРоГ FM</a>
        <script async type="text/javascript"
          src="https://volnorez.com/plugins/jscode/player_js/001e157d/%7B%22autoplay%22%3Atrue%2C%22share%22%3A%22source%22%2C%22skin%22%3A%22skin3%22%2C%22style%22%3A%7B%7D%7D">
        </script>
      </div>
    </div>

    <div class="divider"></div>

    <!-- ЧАТ -->
    <div class="chatWrap">
      <div class="chatFrame">
        <div class="chatMask">
          <iframe
            src="https://m.volnorez.com/pyl_dorog-fm"
            allow="autoplay; clipboard-write"
            referrerpolicy="no-referrer-when-downgrade"
            title="Чат Volnorez">
          </iframe>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
