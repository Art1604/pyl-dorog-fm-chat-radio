<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ПыЛь_ДоРоГ FM — радио и чат</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #dedede;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .app {
      max-width: 980px;
      margin: 10px auto;
      background: #e5e5e5;
      border: 1px solid #9a9a9a;
      border-radius: 8px;
      box-shadow: inset 0 1px 0 #ffffff;
      overflow: hidden;
    }

    .body-wrap {
      padding: 8px;
      background: #e5e5e5;
    }

    .player-box {
      background: #e5e5e5;
      margin-bottom: 6px;
    }

    .chat-frame {
      height: 620px;
      background: #dcdcdc;
      border: 1px solid #9f9f9f;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: inset 0 1px 0 #f8f8f8;
      position: relative;
    }

    .chat-frame iframe {
      width: 100%;
      height: 980px;
      border: 0;
      position: relative;
      top: -360px; /* подрезаем верх страницы до области чата */
      background: #fff;
    }

    .fail {
      display: none;
      padding: 10px;
      font-size: 12px;
      color: #333;
      background: #fff5d8;
      border-top: 1px solid #d9c98d;
    }

    @media (max-width: 700px) {
      .app {
        margin: 0;
        border-radius: 0;
        max-width: 100%;
      }

      .chat-frame {
        height: calc(100vh - 95px);
      }

      .chat-frame iframe {
        height: calc(100vh + 420px);
        top: -330px;
      }
    }
  </style>
</head>

<body>
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <script>
    (async () => {
      try {
        if (window.vkBridge && vkBridge.send) {
          await vkBridge.send('VKWebAppInit');
        }
      } catch (e) {
        console.log('VK init error:', e);
      }
    })();
  </script>

  <div class="app">
    <div class="body-wrap">

      <!-- РОДНОЙ ПЛЕЕР -->
      <div class="player-box">
        <div id="vplayer001e157d">
          <a href="https://volnorez.com/pyl_dorog-fm" title="радио ПыЛь_ДоРоГ FM">
            радио ПыЛь_ДоРоГ FM
          </a>
          <script async type="text/javascript"
            src="https://volnorez.com/plugins/jscode/player_js/001e157d/%7B%22autoplay%22%3Atrue%2C%22share%22%3A%22source%22%2C%22skin%22%3A%22skin2%22%2C%22style%22%3A%7B%22bg_clr%22%3A%22237%2C237%2C237%22%2C%22b_clr%22%3A%22179%2C179%2C179%22%2C%22icon_clr%22%3A%2266%2C66%2C66%22%2C%22ch%22%3A%2237%22%2C%22bg_clr1%22%3A%22243%2C243%2C243%22%2C%22bg_clr2%22%3A%22196%2C196%2C196%22%2C%22bg_clr3%22%3A%22183%2C183%2C183%22%2C%22bg_clr4%22%3A%22167%2C167%2C167%22%2C%22txt_clr%22%3A%22205%2C209%2C205%22%7D%7D">
          </script>
        </div>
      </div>

      <!-- РОДНОЙ DESKTOP ЧАТ С КОЛОНКОЙ ПОЛЬЗОВАТЕЛЕЙ -->
      <div class="chat-frame">
        <iframe
          src="https://volnorez.com/pyl_dorog-fm/#chat_widget"
          allow="autoplay; clipboard-write"
          referrerpolicy="no-referrer-when-downgrade"
          title="Родной чат Volnorez">
        </iframe>
      </div>
    </div>

    <div class="fail" id="failBox">
      Чат не загрузился. Попробуй обновить страницу или открыть станцию на сайте.
    </div>
  </div>

  <script>
    // Простая проверка: если iframe вообще не стартовал, покажем подсказку.
    window.addEventListener('load', () => {
      setTimeout(() => {
        const frame = document.querySelector('.chat-frame iframe');
        const fail = document.getElementById('failBox');
        if (!frame || !frame.src) {
          fail.style.display = 'block';
        }
      }, 4000);
    });
  </script>
</body>
</html>
