<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ПыЛь_ДоРоГ FM — радио и чат</title>

  <style>
    body{
      margin:0;
      background:#e6e6e6;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
    }
    .shell{
      max-width:980px;
      margin:12px auto;
      background:#f4f4f4;
      border:1px solid #8f8f8f;
      border-radius:8px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.15);
    }
    .player{
      padding:10px;
      background:#ededed;
    }

    /* ЛИНИЯ между плеером и чатом */
    .divider{
      height:1px;
      background:#b9b9b9;
      box-shadow:0 1px 0 #ffffff inset;
    }

    .chatWrap{
      padding:6px;
      background:#dcdcdc;
    }
    .chatFrame{
      height:560px;               /* высота чата */
      background:#fff;
      border-top:1px solid #fff;
      border-left:1px solid #fff;
      border-right:1px solid #8f8f8f;
      border-bottom:1px solid #8f8f8f;
      padding:6px;
      overflow:hidden;
    }

    /* контейнер Volnorez-чата */
    #volnorez_chat{
      width:100%;
      height:100%;
      display:block;
    }
  </style>
</head>

<body>
  <!-- Ранний VK init (чтобы VK не писал “Приложение не инициализировано…”) -->
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <script>
    (async () => { try { await vkBridge.send('VKWebAppInit'); } catch(e) {} })();
  </script>

  <div class="shell">

    <!-- ПЛЕЕР (твой дизайн) -->
    <div class="player">
      <div id="vplayer001e157d">
        <a href="https://volnorez.com/pyl_dorog-fm" title="радио ПыЛь_ДоРоГ FM">радио ПыЛь_ДоРоГ FM</a>
        <script async type="text/javascript"
          src="https://volnorez.com/plugins/jscode/player_js/001e157d/%7B%22share%22%3A%22source%22%2C%22skin%22%3A%22main%22%2C%22style%22%3A%7B%7D%7D">
        </script>
      </div>
    </div>

    <!-- ЛИНИЯ -->
    <div class="divider"></div>

    <!-- ЧАТ (классический “серый”, со списком пользователей и смайлами/мемами) -->
    <div class="chatWrap">
      <div class="chatFrame">

        <div id="volnorez_chat"
          data-code="001e157d"
          data-skin="skin_4"
          data-skin-params="'bg_clr':'222,222,222','panel_clr':'216,216,216','ib_clr':'250,250,250','msgbg_clr':'238,238,238','omsgbg_clr':'229,229,229','txt_clr':'18,18,18','b_clr':'145,145,145','icon_clr':'120,120,120','label_clr':'60,61,61','dj_clr':'63,191,7'">
        </div>

        <!-- подключаем рендер чата -->
        <script async src="https://volnorez.com/plugins/jscode/chat_js"></script>

      </div>
    </div>

  </div>
</body>
</html>
