  <style>
    html, body {

      font-family: Arial, sans-serif;

    }

    .app {
      max-width: 980px;

      background: #e5e5e5;
      border: 1px solid #9a9a9a;
      border-radius: 8px;

    .body-wrap {

    .chat-frame {

      background: #dcdcdc;
      border: 1px solid #9f9f9f;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: inset 0 1px 0 #f8f8f8;
      position: relative;
    }

    #volnorez_chat {

      display: block;
    }

    .fail {

      font-size: 12px;

      background: #fff5d8;
      border-top: 1px solid #d9c98d;
    }

    /* лёгкая безопасная правка смайлов */
    .chat_message_input > img {
      vertical-align: bottom !important;
      margin-top: -8px !important;
      margin-bottom: -4px !important;
    }

    .chat_history > div > div > img,
    .chat_msg .chat_msg_text img {
      vertical-align: bottom !important;
      display: inline !important;
      float: none !important;
      position: static !important;
    }

    #volnorez_chat img[class^="smile_"],
    #volnorez_chat .chat_history img[class^="smile_"],
    #volnorez_chat .chat_message_input img[class^="smile_"] {
      max-width: none !important;
      max-height: none !important;
      vertical-align: bottom !important;
      transform: none !important;
      border: 0 !important;
      box-shadow: none !important;
    }

    #volnorez_chat .smileys_tabs {
      white-space: nowrap !important;
      overflow-x: auto !important;
      overflow-y: hidden !important;
    }

    #volnorez_chat .smileys_sheet {
      overflow: auto !important;
    }

    #volnorez_chat .video-container,
    #volnorez_chat .smile_wrapper .video-container {
      background: #000 !important;
      border-radius: 4px !important;
      overflow: hidden !important;
    }

    #volnorez_chat .video_meme,
    #volnorez_chat .smile_wrapper video,
    #volnorez_chat .chat_history video {
      display: block !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
      background: #000 !important;
    }

    @media (max-width: 700px) {
      .app {
        margin: 0;
        border-radius: 0;
        max-width: 100%;
      }

      .chat-frame {
        height: calc(100vh - 95px);
      }
    }
  </style>

  </div>

  <script>
    function normalizeUrl(url) {
      if (!url) return url;
      if (url.startsWith('//')) return 'https:' + url;
      if (url.startsWith('/')) return 'https://volnorez.com' + url;
      return url;
    }

    function fixSmileUrls() {
      const root = document.getElementById('volnorez_chat');
      if (!root) return;

      root.querySelectorAll('img').forEach((img) => {
        const src = img.getAttribute('src');
        const dataSrc = img.getAttribute('data-src');

        if (!src && dataSrc) {
          img.setAttribute('src', normalizeUrl(dataSrc));
        } else if (src) {
          img.setAttribute('src', normalizeUrl(src));
        }
      });

      root.querySelectorAll('source[data-src]').forEach((source) => {
        if (!source.getAttribute('src')) {
          source.setAttribute('src', normalizeUrl(source.getAttribute('data-src')));
        }
      });
    }

    window.addEventListener('load', () => {
      const root = document.getElementById('volnorez_chat');
      const fail = document.getElementById('failBox');

      setTimeout(() => {
        if (!root || root.children.length === 0) {
          fail.style.display = 'block';
        }
      }, 5000);

      setTimeout(fixSmileUrls, 800);
      setTimeout(fixSmileUrls, 1800);
      setTimeout(fixSmileUrls, 3200);
    });
  </script>
