    /* GIF */

    #volnorez_chat .chat_message_input img[class^="smile_gif_"] {

    /* Стикеры и png-мемы в панели */

    /* Панель смайлов */

    #volnorez_chat .smileys_sheet {

    /* Видео-мемы */

    #volnorez_chat .video_meme,

  <script>
    function normalizeUrl(url) {
      if (!url) return url;
      if (url.startsWith('//')) return 'https:' + url;
      if (url.startsWith('/')) return 'https://volnorez.com' + url;
      return url;
    }

    function patchChatAssets() {
      const root = document.getElementById('volnorez_chat');
      if (!root) return;

      root.querySelectorAll('img, source, video').forEach((el) => {
        ['src', 'poster', 'data-src'].forEach((attr) => {
          const value = el.getAttribute(attr);
          if (!value) return;

          const fixed = normalizeUrl(value);
          if (fixed !== value) {
            el.setAttribute(attr, fixed);
          }

          if (attr === 'data-src' && !el.getAttribute('src')) {
            el.setAttribute('src', fixed);
          }
        });
      });

      root.querySelectorAll('img[class^="smile_"]').forEach((img) => {
        const dataSrc = img.getAttribute('data-src');
        if (dataSrc && (!img.getAttribute('src') || img.getAttribute('src') === '')) {
          img.setAttribute('src', normalizeUrl(dataSrc));
        }
      });

      root.querySelectorAll('.video_meme').forEach((video) => {
        video.muted = true;
        video.loop = true;
        video.autoplay = true;
        video.setAttribute('muted', '');
        video.setAttribute('autoplay', '');
        video.setAttribute('loop', '');
        video.setAttribute('playsinline', '');

        video.querySelectorAll('source').forEach((source) => {
          const dataSrc = source.getAttribute('data-src');
          const src = source.getAttribute('src');

          if (dataSrc && !src) {
            source.setAttribute('src', normalizeUrl(dataSrc));
          } else if (src) {
            source.setAttribute('src', normalizeUrl(src));
          }
        });

        try {
          video.load();
          const p = video.play();
          if (p && typeof p.catch === 'function') p.catch(() => {});
        } catch (e) {}
      });
    }

    function bindChatPatch() {
      const root = document.getElementById('volnorez_chat');
      if (!root) return;

      root.addEventListener('click', (e) => {
        if (
          e.target.closest('.chat_smile_btn') ||
          e.target.closest('.smileys_tabs') ||
          e.target.closest('[data-tab="9"]')
        ) {
          setTimeout(patchChatAssets, 80);
          setTimeout(patchChatAssets, 400);
          setTimeout(patchChatAssets, 1200);
        }
      });

      const observer = new MutationObserver(() => {
        patchChatAssets();
      });

      observer.observe(root, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ['src', 'data-src', 'poster', 'style', 'class']
      });
    }

    window.addEventListener('load', () => {
      setTimeout(() => {
        const root = document.getElementById('volnorez_chat');
        const fail = document.getElementById('failBox');

        if (!root || root.children.length === 0) {
          fail.style.display = 'block';
        }
      }, 4000);

      setTimeout(patchChatAssets, 1200);
      setTimeout(patchChatAssets, 2500);
      setTimeout(patchChatAssets, 5000);
      setTimeout(bindChatPatch, 1500);
    });
  </script>
