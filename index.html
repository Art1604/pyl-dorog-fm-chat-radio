<!doctype html>
<html lang="ru">
<head>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #dcdcdc;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .app {
      max-width: 980px;
      margin: 8px auto;
      background: #e5e5e5;
      border: 1px solid #9a9a9a;
      border-radius: 8px;
      box-shadow: inset 0 1px 0 #ffffff;
      overflow: hidden;
    }

    .body-wrap {
      padding: 6px;
      background: #e5e5e5;
    }

    .player-box {
      background: #e5e5e5;
      margin-bottom: 4px;
    }

    .chat-frame {
      height: 560px;
      background: #dcdcdc;
      border: 1px solid #9f9f9f;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: inset 0 1px 0 #f8f8f8;
      position: relative;
    }

    #volnorez_chat {
      width: 100%;
      height: 100%;
      display: block;
    }

    .fail {
      display: none;
      padding: 10px;
      font-size: 12px;
      color: #333;
      background: #fff5d8;
      border-top: 1px solid #d9c98d;
    }

    @media (max-width: 700px) {
      .app {
        margin: 0;
        border-radius: 0;
        max-width: 100%;
      }

      .chat-frame {
        height: calc(100vh - 95px);
      }
    }
  </style>
</head>

<body>

  <div class="app">

  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const root = document.getElementById('volnorez_chat');
        const fail = document.getElementById('failBox');

        if (!root || root.children.length === 0) {
          fail.style.display = 'block';
        }
      }, 4000);
    });
  </script>
</body>
</html>
