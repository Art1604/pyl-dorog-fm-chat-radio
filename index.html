<!doctype html>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #dcdcdc;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .app {
      max-width: 980px;
      margin: 8px auto;
      background: #e5e5e5;
      border: 1px solid #9a9a9a;
      border-radius: 8px;
      box-shadow: inset 0 1px 0 #ffffff;
      overflow: hidden;
    }

    .body-wrap {
      padding: 6px;
      background: #e5e5e5;
    }

    .player-box {
      background: #e5e5e5;
      margin-bottom: 4px;
    }

    .chat-frame {
      height: 560px;
      background: #dcdcdc;
      border: 1px solid #9f9f9f;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: inset 0 1px 0 #f8f8f8;
      position: relative;
    }

    #volnorez_chat {
      width: 100%;
      height: 100%;
      display: block;
    }

    .fail {
      display: none;
      padding: 10px;
      font-size: 12px;
      color: #333;
      background: #fff5d8;
      border-top: 1px solid #d9c98d;
    }

    /* Родная правка Volnorez для поля ввода */
    .chat_message_input > img {
      vertical-align: bottom !important;
      margin-top: -8px !important;
      margin-bottom: -4px !important;
    }

    /* Общая аккуратная правка смайлов */
    #volnorez_chat img[class^="smile_"],
    #volnorez_chat .chat_history [class^="smile_"],
    #volnorez_chat .chat_message_input [class^="smile_"],
    #volnorez_chat .chat_smileys [class^="smile_"] {
      display: inline-block !important;
      max-width: none !important;
      max-height: none !important;
      background-repeat: no-repeat !important;
      background-position: center center !important;
      vertical-align: bottom !important;
      border: 0 !important;
      box-shadow: none !important;
      transform: none !important;
    }

    /* Стандартные и эмоции */
    #volnorez_chat img[class^="smile_def_"],
    #volnorez_chat img[class^="smile_emo_"],
    #volnorez_chat .chat_history img[class^="smile_def_"],
    #volnorez_chat .chat_history img[class^="smile_emo_"],
    #volnorez_chat .chat_message_input img[class^="smile_def_"],
    #volnorez_chat .chat_message_input img[class^="smile_emo_"] {
      width: 28px !important;
      height: 28px !important;
      min-width: 28px !important;
      min-height: 28px !important;
      background-size: 100% auto !important;
    }

    /* GIF */
    #volnorez_chat img[class^="smile_gif_"],
    #volnorez_chat .chat_history img[class^="smile_gif_"],
    #volnorez_chat .chat_message_input img[class^="smile_gif_"] {
      width: 30px !important;
      height: 30px !important;
      min-width: 30px !important;
      min-height: 30px !important;
      background-size: contain !important;
    }

    /* Панель смайлов */
    #volnorez_chat .smileys_tabs {
      white-space: nowrap !important;
      overflow-x: auto !important;
      overflow-y: hidden !important;
    }

    #volnorez_chat .smileys_sheet {
      overflow: auto !important;
    }

    /* Видео-мемы только визуально, без принудительной догрузки */
    #volnorez_chat .video-container,
    #volnorez_chat .smile_wrapper .video-container {
      background: #000 !important;
      border-radius: 4px !important;
      overflow: hidden !important;
    }

    #volnorez_chat .video_meme,
    #volnorez_chat .smile_wrapper video,
    #volnorez_chat .chat_history video {
      display: block !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
      background: #000 !important;
    }

    @media (max-width: 700px) {
      .app {
        margin: 0;
        border-radius: 0;
        max-width: 100%;
      }

      .chat-frame {
        height: calc(100vh - 95px);
      }
    }
  </style>
</head>
